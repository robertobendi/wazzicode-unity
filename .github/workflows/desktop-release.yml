# Unsigned cross-platform release build for Unity Vibe Studio (apps/desktop).
#
# Triggers on a `desktop-v*` tag push (e.g. `git tag desktop-v0.1.0 && git push
# --tags`) or manual dispatch. Produces, per OS:
#   - macOS  arm64 + intel   → .dmg  (both on the arm64 runner; intel is cross-compiled)
#   - Windows x86_64         → .msi + NSIS .exe
#   - Linux   x86_64         → .deb + .AppImage
# and attaches them to a DRAFT GitHub release named "Unity Vibe Studio <tag>",
# which an admin publishes manually.
#
# These builds are UNSIGNED / UN-notarized: no Apple, minisign, or updater
# secrets are referenced anywhere. Install notes (Gatekeeper right-click→Open,
# Windows SmartScreen) live in apps/desktop/README.md.
#
# The build cannot use the base tauri.conf.json alone: the Node sidecar
# (externalBin) and the bundled uvibe.cjs + Unity package (resources) live only
# in the tauri.bundle.conf.json overlay, and those artifacts don't exist until
# the pre-build steps below run. So every matrix leg does, in order:
#   pnpm install → pnpm build (workspace; produces apps/cli/dist for bundling)
#   → fetch-node-sidecar.mjs --target <triple> → bundle-uvibe.mjs
#   → tauri build --config src-tauri/tauri.bundle.conf.json --target <triple>
name: desktop-release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch: {}

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (M-series runner) — native arm64
            target: aarch64-apple-darwin
          # Intel runners are retired (a macos-13 job queued for 24h in the first
          # release run and was auto-cancelled) — cross-compile x86_64 from the
          # arm64 runner instead; rustup provides the target and the sidecar is
          # fetched per-triple, never executed at build time.
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # pnpm first so setup-node's `cache: pnpm` can find it. Version is read
      # from the root package.json "packageManager" field (pnpm@10.x).
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      # Each runner builds only its own target natively — no cross-compile.
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"
          key: ${{ matrix.target }}

      # libappindicator3-dev (legacy) explicitly Conflicts: with
      # libayatana-appindicator3-dev (what Tauri 2 uses), so only the ayatana
      # package is listed.
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Builds every workspace package incl. apps/cli/dist — bundle-uvibe.mjs
      # esbuild-bundles that dist into resources/uvibe.cjs, so it must run first.
      - name: Build workspace
        run: pnpm build

      # Fetch ONLY the `node` binary for this leg's triple into
      # src-tauri/binaries/node-<triple>[.exe] (Tauri externalBin naming).
      - name: Fetch Node sidecar
        working-directory: apps/desktop
        run: node scripts/fetch-node-sidecar.mjs --target ${{ matrix.target }}

      # Emit resources/uvibe.cjs (bundled CLI) + resources/UnityVibeOS (UPM pkg).
      - name: Bundle uvibe MCP server
        working-directory: apps/desktop
        run: node scripts/bundle-uvibe.mjs

      # Vendor the offline dictation model + ONNX runtime into public/ so the mic
      # works with no network and no API credits. Host-agnostic (pure WASM), so
      # unlike the Node sidecar it needs no --target. Without this the app still
      # builds — it just ships with the mic button hidden, which would be a silent
      # feature regression rather than a build failure. Hence: not optional.
      - name: Vendor dictation model (Whisper + ONNX runtime)
        working-directory: apps/desktop
        run: node scripts/fetch-whisper.mjs

      # tauri-action runs `tauri build` in apps/desktop with the args appended
      # verbatim, so the overlay config + target match the local invocation. It
      # also upserts one draft release per tag and uploads this leg's bundles.
      # NO signing/updater env — builds ship unsigned.
      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: --config src-tauri/tauri.bundle.conf.json --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: "Unity Vibe Studio ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          releaseBody: |
            Unity Vibe Studio — make Unity changes with AI, no terminal.

            These builds are **unsigned**. First launch:

            - **macOS**: right-click the app → **Open** (or run
              `xattr -d com.apple.quarantine "/Applications/Unity Vibe Studio.app"`)
              to get past Gatekeeper.
            - **Windows**: on the SmartScreen prompt click **More info → Run anyway**.
              The installer fetches the WebView2 runtime automatically if missing.
            - **Linux**: the `.AppImage` is self-contained (`chmod +x` then run);
              the `.deb` installs via `apt install ./<file>.deb`.

            See apps/desktop/README.md for the pairing/onboarding flow.
